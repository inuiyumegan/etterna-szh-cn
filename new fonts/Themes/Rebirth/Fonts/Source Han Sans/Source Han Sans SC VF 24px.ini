[kanji-jis1]
Baseline=30
Top=11
LineSpacing=34

Line  0=唖娃阿姶逢葵茜穐渥旭葦芦鯵梓斡姐虻飴絢綾鮎或粟袷庵按鞍杏伊夷惟謂
Line  1=亥郁磯溢鰯允胤蔭吋烏迂卯鵜窺丑碓嘘欝蔚鰻姥厩瓜閏噂云荏叡嬰曳洩瑛
Line  2=盈穎頴榎厭堰奄掩焔燕苑薗鴛於甥襖鴬鴎荻桶牡伽嘉珂禾茄蝦嘩迦霞俄峨
Line  3=臥蛾駕廻恢魁晦芥蟹凱咳碍鎧浬馨蛙蛎鈎劃廓撹赫笠樫橿梶鰍恰鰹叶椛樺
Line  4=鞄兜竃蒲噛鴨栢茅萱粥苅侃姦柑桓澗潅竿翰莞諌舘巌癌翫贋雁嬉毅稀徽妓
Line  5=祇蟻誼掬鞠吃桔橘砧杵黍仇汲灸笈渠鋸禦亨侠僑兇匡卿喬彊怯蕎饗尭桐粁
Line  6=欣欽禽芹衿倶狗玖矩躯駈喰寓櫛釧屑沓轡窪隈粂栗鍬卦袈祁圭珪慧桂畦繋
Line  7=罫荊頚戟訣倦喧捲牽硯鹸絃諺乎姑狐糊袴胡菰跨鈷伍吾梧檎瑚醐鯉佼倖垢
Line  8=宏巷庚弘昂晃杭浩糠紘肱腔膏砿閤鴻劫壕濠轟麹鵠漉甑忽惚狛此坤昏梱艮
Line  9=些叉嵯瑳裟坐哉犀砦冴堺榊肴碕鷺咋朔窄鮭笹匙薩皐鯖捌錆鮫晒撒燦珊纂
Line 10=讃餐仔屍孜斯獅爾痔而蒔汐鴫竺宍雫叱悉蔀篠偲柴屡蕊縞紗杓灼錫惹綬洲
Line 11=繍蒐讐輯酋什戎夙峻竣舜駿楯淳醇曙渚薯藷恕鋤哨嘗妾娼庄廠捷昌梢樟樵
Line 12=湘菖蒋蕉裳醤鉦鍾鞘丞擾杖穣埴燭蝕晋榛疹秦塵壬訊靭笥諏厨逗翠錐瑞嵩
Line 13=趨雛椙菅頗雀摺棲栖脆蹟碩蝉尖撰栴煽穿箭舛賎閃糎噌岨曾楚疏蘇鼠叢宋
Line 14=匝惣掻槍漕糟綜聡蒼鎗其揃詑柁舵楕陀騨岱腿苔黛鯛醍鷹瀧啄托琢鐸茸凧
Line 15=蛸只叩辰巽竪辿狸鱈樽坦歎湛箪耽蛋檀弛智蜘馳筑註樗瀦猪苧凋喋寵帖暢
Line 16=牒蝶諜銚槌鎚栂掴槻佃柘辻蔦綴鍔椿壷嬬紬吊剃悌挺梯汀碇禎蹄鄭釘鼎擢
Line 17=鏑轍填纏甜顛澱兎堵屠杜菟鍍砥砺塘套宕嶋梼淘涛燈祷董蕩鐙撞萄鴇涜禿
Line 18=橡椴鳶苫寅酉瀞噸惇敦沌遁呑乍凪薙灘捺楢馴畷楠汝迩賑廿韮濡禰祢葱撚
Line 19=乃廼之埜嚢膿覗蚤巴播杷琶芭盃牌楳煤狽這蝿秤矧萩剥柏箔粕曝莫駁函硲
Line 20=肇筈櫨幡畠溌醗筏鳩噺塙蛤隼叛釆挽磐蕃匪庇斐緋誹樋簸枇毘琵柊稗疋髭
Line 21=彦菱弼畢逼桧紐謬彪瓢豹廟錨鋲蒜蛭鰭彬斌瀕埠冨斧芙撫葡蕪楓葺蕗淵弗
Line 22=鮒吻扮焚糞頁僻碧瞥箆篇娩鞭鋪圃甫輔戊菩呆峯庖捧朋烹萌蓬鋒鳳鵬鉾吠
Line 23=頬卜穆釦殆幌哩槙鮪柾鱒桝亦俣沫迄侭麿蔓巳箕湊蓑稔粍牟鵡椋姪牝棉緬
Line 24=摸孟蒙儲杢勿尤籾貰悶也爺耶靖薮鑓愈佑宥揖柚涌猷祐邑輿傭楊熔耀蓉遥
Line 25=慾淀螺莱洛蘭李裡葎掠劉溜琉龍亮凌梁稜諒遼淋燐琳鱗麟伶嶺怜玲苓憐漣
Line 26=煉簾聯蓮魯櫓婁榔牢狼篭聾蝋禄肋倭歪鷲亙亘鰐詫藁蕨椀碗

