[ScreenHelpMenu]
Title=帮助
Exit=返回
Instruction=点击左侧项目查看详情。\n滑动列表可浏览更多分类。\n\n译者：建议在bilibili搜索StepMania排列入门 v1.0。\n会对部分翻译进行本地化，读者可对照原文查看。\n对于使用高宽比4：3以下的玩家，较长的文本可能会显示不完全，\n因为中文被会识别为整个单词，不会触发自动换行。\n注：如无标注，第一人称代词均指帮助界面作者，而不是译者。
CategoryCommon Pattern Terminology=常见术语
CategoryHotkeys=快捷键
CategoryHow-To=操作教程
CategoryInformation=基础信息
CategoryTroubleshooting=故障排查
RollAscending=滚动（Roll） (1234)
RollAscendingShortDescription=可以当对拍（jumptrill）打
RollAscendingDescription=滚动（Roll）是此类排列的统称，要求按顺序按下所有轨道，重复前不可提前按\n任意轨道。滚动有很多子类型。\n\n这种排列可称为升序（ascending）滚动。若滚动反向与此相反（4321），则\n称为降序（descending）滚动。\n\n滚动方向并不影响对拍打法，只有速度决定是否可用对拍手法游玩。
RollInward=滚动（Roll） (1243)
RollInwardShortDescription=可以当对拍（jumptrill）打
RollInwardDescription=滚动（Roll）是此类排列的统称，要求按顺序按下所有轨道，重复前不可提前按\n任意轨道。滚动有很多子类型。\n\n这种子排列可称为内向轮指（split）。滚动方向与此相反（4312）的排列，其\n打法仍与内轮相同。\n\n滚动方向并不影响对拍打法，只有速度决定是否可用对拍手法游玩。
RollSplit=滚动（Roll）(4132)
RollSplitShortDescription=可以当对切（split jumptrill）打
RollSplitDescription=滚动（Roll）是此类排列的统称，要求按顺序按下所有轨道，重复前不可提前按\n任意轨道。滚动有很多子类型。\n\n这种子排列可称为内向轮指（split）滚动，双手内轮（split hand）滚动或内轮切指（split trill）滚动。滚动方向与此相反（4312）\n的排列，其打法仍与内轮相同。\n\n这种子排列难度高于其他滚动，高速击打时手法与对切类似。
Gluts=Gluts（没有权威翻译）
GlutsShortDescription=已消失的名称，又称“过载（in excess）”
GlutsDescription=Gluts是统称，包含双押gluts（jumpgluts）和三押gluts（handgluts）。其是\n否存在一直有争议。\n\n公认定义为，双押gluts有连续的双押（双押叠（jumpjacks）），在gluts中切\n换轨道对时会形成子弹（minijacks）。图中因1&4轨出现子弹，故归为glut。\n\nGluts属于大叠（chordjacks）子键型，核心难点在叠键速度，而非多押本身。
Chordjack=大叠（Chordjack）
ChordjackShortDescription=形成叠键（jacks）的多押（chords）组合
ChordjackDescription=大叠是完全由多押构成、且形成叠键的键型统称。\n\n键型内的多押可任意变化，双押（jumps）、三押（hands）、四押（quads）\n均有效。图示为中密度大叠，仅包含双押与三押。
DenseChordjack=满叠（Dense Chordjack）
DenseChordjackShortDescription=GIVE ME SOMETHIN' TO BREAK! ! !
DenseChordjackDescription=满叠是大叠的进阶形式，以三押（hands）、四押（quads）为主，密度极高时\n又称扣洞叠（holedodge），因为在读谱时音符占比远超空白区域。\n\n该键型极度耗耐力（stamina），因几乎全为三押和四押，所以必然夹\n纵连（longjacks），难度非常高。
Stream=乱键（Stream）
StreamShortDescription=连续单键
StreamDescription=顾名思义，乱键是连续的单键音符（译者：英语母语者更能体会溪流（stream）\n和乱键的关系），核心特征为音符分布在不同轨道，不形成叠键（jacks）。\n键型可包含多种自键型，只要不偏离核心定义即可。\n\n乱键中可嵌套子弹（minijacks）、多押（chords）等，仅增加难度，不改变乱\n键本质。\n\n图示为略带滚动（roll）排列特点的乱键。
Jumpstream=双押切（Jumpstream）
JumpstreamShortDescription=夹双押（jumps）的乱键（stream）
JumpstreamDescription=双押切是乱键的进阶形式，要求键型内按特定频率出现双押。其余规则与乱键一\n致。\n\n右侧图示为1轨夹锚键（anchor）的双押切，熟练玩家可直接通过读谱（read）\n按对拍（jumptrill） 打法处理。
Handstream=三押切（Handstream）
HandstreamShortDescription=夹三押（hands）的乱键（stream）
HandstreamDescription=三押切是乱键的进阶形式，要求键型内按特定频率出现三押。也常嵌套双押（此\n类又称高密度三押切（dense handstream）），极高密度的三押切则\n仅由三押和单押（single）组成。\n\n对于4个轨道，三押仅有4种排列方式，三押切含有锚键（anchor）极常见。右\n侧图示在4轨有锚，部分玩家也会认为3轨有锚。
Quadstream=四押切（Quadstream）
QuadstreamShortDescription=夹四押（quads）的乱键（stream）
QuadstreamDescription=四押切是乱键的进阶形式，但键型已趋近大叠（chordjack）。\n\n核心特征为，四押和单押（single）一定会形成子弹（minijacks），但整体手\n感仍接近乱键而不是大叠。\n\n四押频率过高时，因轨道数量限制，会丧失乱键手感，彻底变为大叠。
Trill=交互（Trill）
TrillShortDescription=同乐理中的颤音（trill）
TrillDescription=交互是两轨交替连续敲击的排列，游戏中可单手完成（单手交互（one hand trill）），也可双手完成（双手交互（two hand trill））。\n\n交互不限定相邻轨道，也可跨轨（如1/3轨）。\n\n右图为双手交互。
Jumptrill=对拍（Jumptrill）
JumptrillShortDescription=手速比无言了
JumptrillDescription=对拍是双手交互的进阶形式，一手双押，另一手接双押，循环交替。除满叠\n（dense chordjacks）外，对拍通常是谱面NPS（每秒音符数）\n最高的段落。\n\n多数复杂谱型均可拆解为对拍，适合省力打法，但不建议频繁使用，容易养成坏\n习惯并影响准度（accuracy）。
SplitJumptrill=对切（Split Jumptrill [13][24]）
SplitJumptrillShortDescription=更难
SplitJumptrillDescription=对切是乱序的对拍（jumptrill），拆解为两个单手交互（one hand trill），而非双手对拍。\n\n因多数玩家无法流畅击打，成为最难的排列之一。该子排列难度高于[14][23]\n型，双手同向式打击时，玩家容易下意识按对拍或滚动（roll）打法处理，容易\n失误。所幸节奏到位时，仍可按对拍核心逻辑击打。\n\n右图为长段对切。
SplitJumptrillTrainTrack=对切（Split Jumptrill [14][23]）
SplitJumptrillTrainTrackShortDescription=难
SplitJumptrillTrainTrackDescription=对切是乱序的对拍（jumptrill），拆解为两个单手交互（one hand trill），而非双手对拍。\n\n相比上一子排列，本排列手感更自然，难度稍低。只要击打节奏精准，仍可按对\n拍手法完成。\n\n右图为长段对切。
Minijacks=子弹（Minijacks）
MinijacksShortDescription=MISS MISS MISS FAILD
MinijacksDescription=子弹是两连叠键（jacks），可连续使用（如右图），也可嵌套在乱键（stream）\n等键型中。\n\n因判定窗口机制，子弹间距越近，精准打击难度越高。例如，单键判定窗口为\n180ms，叠键需在这段时间内完成两次击打，叠键速度过快或手速不足时，必\n然丢分。\n\n子弹可嵌套在叠键中形成叠键爆发（burst），也常见于乱键过渡\n段（叠键替代交互（trill））。
Longjack=纵连（Longjack）
LongjackShortDescription=手速不够就等死吧 桀桀桀桀
LongjackDescription=纵连是同一轨道连续单键敲击的叠键（jack/jackhammer），或者加长版叠键。\n\n纵连的定义长度暂无统一标准，一般认为认≥5-6 连为纵连，理论上\n最长可无限延续。\n\n纵连是连续双押叠（jumpjacks）、三押叠（handjacks）、四押叠\n（quadjacks）的基础排列，也是秒杀（vibro）打法的核心排列。
Anchor=锚键（Anchor）
AnchorShortDescription=区别于纵连（longjacks）
AnchorDescription=锚键是谱面中某几轨持续出现音符，相对其他轨道形成固定锚定，最常见为单轨\n锚键。\n\n锚点可与谱型主体节奏对齐、错位或混合排列。持续的锚点最终会拆解为长叠\n键，大幅增加耐力（stamina）消耗。右图为第4轨的锚键。
Minedodge=地雷图
MinedodgeShortDescription=MAN! ! !
MinedodgeDescription=地雷图指音符刻意紧贴地雷摆放的谱面，难度非常高。\n\n地雷不会改变谱面 MSD，因为难度只与普通音符有关。\n\n其难点在于，需控制按键的按下和松开时机。皮肤也会影响读谱难度。
Hold=长键（Hold）
HoldShortDescription=面馆开店了
HoldDescription=长键是需全程按住按键的音符类型，也叫冻结键或长音符（freezes/long \nnotes）。\n\n纯长键的键型称面海（holdstream），如果空白区域均为长键则称为反键（full \ninverse）。\n\n长键允许短暂松手（≤250ms），松手后可重新按住。长音无\n松开判定，但可通过离键（lifts）和地雷（mines）模拟松手判定效果。
Rolld=连键（Roll / Rolld）
RolldShortDescription=一直连续点
RolldDescription=连键是特殊长键，不可长按，需全程连续敲击。\n\n敲击速度存在无判定最低阈值，在所有判定难度下，间隔≥500ms敲击无判定，\n需快速连点才可生效。
Burst=爆发（Burst）
BurstShortDescription=高速排列
BurstDescription=字面意为“相对当前排列，突然密集的排列”。\n\n与上述的其他排列不同，爆发可任意形态呈现。叠键（jacks）、双押切\n（jumpstream）均能形成爆发，类似把常规排列等比压缩。\n\n多数爆发排列设计友好，易全连（full combo），但也存在例外。
Polyrhythm=多级节奏（Polyrhythm）
PolyrhythmShortDescription=烧脑这一块
PolyrhythmDescription=多级节奏谱面同时使用多种节奏，需使用交替节拍敲击，最终形成非常别扭、操\n作难度偏高的键型。\n\n右侧为复节奏图示，是16分音符和12分音符的混合。
Graces=Graces / Flams（没有权威翻译）
GracesShortDescription=点缀式装饰音符
GracesDescription=Graces是轻微错位的音符，形成高分度的小乱键（stream），为谱面增添点缀\n效果。\n\n对应乐理中的装饰音（graces）概念（非必要，但贴合音乐）。\n\n可以理解为多押（chord）被拆解为密集的单键。
Runningman=跑者（Runningman）
RunningmanShortDescription=有锚键（anchor）的乱键（stream）
RunningmanDescription=狭义上，跑者指带锚键（anchor）的乱键（stream）。广义上，我们也允许出\n现多押（chord）。这样会使双押锚切（anchored jumpstream）\n也归于跑者的定义，但我们更常称其为双押锚切。\n\n锚键轨道必须与谱面主体节奏错开，以尽量避免形成多押。\n\n右图为一轨存在锚键的跑者。非锚键的按键可以分布在任意轨道，但与锚键同手\n敲击的按键不宜过多。
GlobalHotkeys=全局快捷键
GlobalHotkeysShortDescription=任何界面都可用
GlobalHotkeysDescription=F2 -- 重新加载纹理与配置文件R\nF2 + Shift -- 重新加载纹理\nF2 + Ctrl -- 重新加载脚本\nF2 + Shift + Ctrl -- 重新加载悬浮界面\nF3 -- 调试菜单（含有多项快捷功能）\nF9 -- 切换作者自定义元数据音译功能\nAlt + Enter -- 切换全屏\nTab -- 动画速度加快至4倍\n~ -- 动画速度减慢至1/4倍\nPause|Break -- 切换菜单音效\nPrintScreen -- 截图
SelectMusicHotkeys=选歌界面快捷键
SelectMusicHotkeysShortDescription=仅选歌界面可用
SelectMusicHotkeysDescription=F1 -- 歌曲搜索\nCtrl + Q -- 加载新的歌曲文件夹\nShift + Ctrl + R -- 重新加载当前歌曲文件夹\nShift + Ctrl + P -- 重新加载当前曲包文件夹\nCtrl + F -- 将当前歌曲标记为喜欢\nCtrl + M -- 永久镜像当前歌曲\nCtrl + G -- 将当前歌曲作为目标\nCtrl + O -- 切换练习模式\nCtrl + S -- 保存资料\nCtrl + P -- 创建收藏夹\nCtrl + A -- 将当前谱面添加进收藏夹\nCtrl + 数字键小键盘 -- 若在主界面，调用右上角资料悬浮窗；若在其他界面，切换到主界面\n数字键小键盘 -- 切换主界面/设置界面\nEscape/Back -- 在侧面面板界面时，返回到先前的界面\nCtrl + L -- 登录/登出\nSpace -- 切换总览界面/歌曲预览界面\n鼠标右键 -- 暂停歌曲播放
GameplayHotkeys=游玩界面快捷键
GameplayHotkeysShortDescription=仅游玩界面可用
GameplayHotkeysDescription=长按Enter -- 强制失败\nF4 -- 撤销保存前的偏移值\nF6 -- 设备自动同步偏移模式\nF7 -- 按键音效\nLeftShift + F7 -- 小节音效\nF8 -- 自动游玩模式\nF11 -- 减少谱面偏移\nAlt + F11 -- 小幅减少谱面偏移\nF12 -- 增加谱面偏移\nAlt + F12 -- 小幅增加谱面偏移\nShift + F11 -- 减少全局偏移\nAlt + Shift + F11 -- 小幅减少全局偏移\nShift + F12 -- 增加全局偏移\nAlt + Shift + F12 -- 小幅增加全局偏移
CustomizeGameplayHotkeys=自定义游玩界面快捷键
CustomizeGameplayHotkeysShortDescription=仅自定义游玩界面可用
CustomizeGameplayHotkeysDescription=Enter -- 选中或取消已选择的界面元素\nDelete/Backspace/重新开始键 -- 撤销最近一次的修改\nCtrl + Undo -- 将选中的元素恢复至默认\n鼠标右键 -- 取消选中的元素\n方向键 -- 移动菜单或选中的元素\nShift + 方向键 -- 小幅移动选中的元素\nSpace -- 切换选中元素的修改类型
PracticeHotkeys=练习模式快捷键
PracticeHotkeysShortDescription=仅练习模式可用
PracticeHotkeysDescription=Backspace -- 跳转到循环段起点或已标记书签的位置\n效果上 -- 歌曲倍速增加0.05\n效果下 -- 歌曲倍速减少0.05\n投币 -- 设置书签或循环段落的区间\n暂停中按两次投币 -- 重新设置重复段落或书签\n鼠标滚轮滚动 -- 暂停中微调歌曲进度\n鼠标右键 -- 暂停\n鼠标左键进度条 -- 跳转到相应位置\n鼠标右键进度条 -- 设置书签或循环段落的区间
ReplayHotkeys=回放快捷键
ReplayHotkeysShortDescription=仅回放界面可用
ReplayHotkeysDescription=投币 -- 暂停\n\n以下快捷键仅能在暂停时使用：\nAlt + 效果上 -- 设置书签\nAlt + 效果下 -- 跳转到书签位置\nShift + 效果上 -- 歌曲倍速增加\nShift + 效果下 -- 歌曲倍速减少0.05\n效果上 -- 歌曲进度前进5秒\nCtrl + 效果上 -- 歌曲进度前进0.1秒\n效果下 -- 歌曲进度后退5秒\nCtrl + 效果下 -- 歌曲进度后退0.1秒
EvaluationHotkeys=结算界面快捷键
EvaluationHotkeysShortDescription=仅结算界面可用
EvaluationHotkeysDescription=Ctrl + L -- 登录/登出\n“上”/“下”方向键 -- 切换轨道偏移图\n效果上 -- 提高结算判定\n效果下 -- 降低结算判定\n选择 -- 截图\n“左” + “右”方向键 -- 截图
MultiplayerHotkeys=多人游戏界面快捷键
MultiplayerHotkeysShortDescription=仅多人联机界面可用
MultiplayerHotkeysDescription=多人联机模式还在制作中！
HowToCreateCharts=写谱
HowToCreateChartsShortDescription=现在立刻塞爆
HowToCreateChartsDescription=你需要一款谱面编辑器。\nEtterna 目前未内置编辑器，主流选择为 ArrowVortex 和 DDReam，\n也有部分玩家会使用 osu 编辑器或旧版 StepMania 3/5 编辑器。\n\n关键是要拥有能放置音符，并导出.sm格式文件的工具。关键是要拥有能放置音符，并导出 .sm 这类有效格式文件的工具。\n\n一个谱面仅需音频文件和元数据文件（例如.sm文件）即可加载。\n注意，务必确保这两个文件都已放入Etterna的Songs文件夹后，再尝试加载谱面。\n\n网上有更详尽的谱面制作教程，你在社区里提问的话，多数玩家都会乐意帮忙。
HowToManualSongInstall=手动下载歌曲
HowToManualSongInstallShortDescription=不想在客户端内下载的话，就用这个方法
HowToManualSongInstallDescription=你自制或下载了一首单曲，或是一个曲包，现在需要让它能在游戏里加载出来。\n\n文件夹结构是这样的——/曲包名/歌曲名/谱面文件.sm。\n\n如果你下载的是一个曲包，只需要解压这个曲包文件夹，然后把它放到 Songs文件夹里就行。最终的路径就是/Songs/曲包名/歌曲名/谱面文件.sm。\n\n如果你只有一首单曲，应该在Songs文件夹里为它新建一个曲包文件夹，文件夹名称可以随意设置。完成这些操作后，要么重启游戏，要么在选歌界面\n按下 Ctrl + Q 重新加载歌曲库。\n\n如果出于某些原因，你想把游戏安装目录和歌曲目录分离开，就打开Preferences.ini文件，在AdditionalSongFolders中填入新的Songs文件夹的绝\n对路径。
HowToDownloadPacks=下载曲包
HowToDownloadPacksShortDescription=游戏内下载
HowToDownloadPacksDescription=部分地区下载速度偏慢在游戏内下载曲包非常简单。如果你还没有安装任何曲包，首次进入游戏会先跳转到预设包选择页面，这里会展示\n几组不同难度的曲包，帮你快速上手。\n\n要是你跳过了这个页面，或者不想要这些预设包，又或者已经安装过一些曲包了，就可以在选歌界面打开下载器。在界面右上角的菜单里（快捷键为\nCtrl + 3），能找到所有可在游戏内下载的曲包。如果这个列表是空的，可能是你没有联网。\n\n如果这些内置下载源出了问题，你可以在社区里问问其他人，还有不少其它的曲包获取渠道。\n\n下载完成的曲包会自动解压并安装。要是你看到下载完成的提示，但游戏里却没有任何变化，那很可能是下载失败了。
HowToSongSearch=搜索歌曲
HowToSongSearchShortDescription=查找已安装歌曲
HowToSongSearchDescription=你可能会以为能在游戏里搜索未安装的歌曲，先把这点说清楚 —— 目前游戏内暂不支持这个功能。\n\n你可以搜索已经安装的歌曲，在选歌界面右上角最左侧的按钮（快捷键为F1）。这个界面的操作很简单，只需要填写你关心的筛选条件，按下回车键，\n就能看到搜索结果。\n\n除此之外，那些提供曲包的网站一般都会带有搜索功能。
HowToSongFilter=歌曲筛选
HowToSongFilterShortDescription=筛选已安装歌曲
HowToSongFilterDescription=歌曲筛选功能是和歌曲搜索功能集成在一起的，你可以在选歌界面右上角最左侧的按钮（快捷键为F1）里找到它。\n\n这个菜单目前暂不支持键盘操作，但用鼠标拖动滑块，就足以设置好筛选条件。把滑块拖到最左端或最右端时，就相当于把这个筛选条件设为0或无上\n限，也就是禁用该筛选条件。
HowToSortmode=歌曲排序
HowToSortmodeShortDescription=对已安装歌曲进行排序
HowToSortmodeDescription=支持多种预设的排序方式。\n\n在选歌界面按下“上”“下”“上”“下”方向键的快捷键组合，选歌栏就会切换成排序模式选择菜单。不同的玩家会觉得不同的排序方式更实用。\n\n大多数玩家用的都是曲包排序，因为这是最符合所有人使用习惯的默认排序方式。还有一些排序方式，更多是用来查看歌曲的相关信息。\n\n如果你想修改这些排序方式的运行逻辑，可以去查看Scripts/WheelDataManager文件里的相关代码。
HowToCustomizeGameplay=自定义游玩界面
HowToCustomizeGameplayShortDescription=更改之后更易于游玩
HowToCustomizeGameplayDescription=自定义游玩界面元素，能让你按照自己的需求，几乎无限制地修改游玩界面上的所有元素。\n\n界面右侧是导航和信息面板，你可以拖动它以便于查看。要是你不习惯用鼠标，也可以用方向键来操作。\n\n按下回车键可以选中高亮的元素，或者直\n接用鼠标点击元素来选中。按下空格键，可以切换当前选中元素的修改类型，可选的类型包括坐标和尺寸等，不过有些元素只支持一种修改类型。你也\n可以直接用鼠标拖动元素来调整。\n\n按住Shift键的同时拖动元素，可以实现小幅度移动。按下“重新开始”键可以撤销上一步的修改，要是按住Ctrl键再按这个键，就能把选中的元素恢复\n至默认。\n\n只要你退出该界面，所有的修改就会立即保存。
HowToUpdate=更新Etterna
HowToUpdateShortDescription=备份好你的数据
HowToUpdateDescription=在所有操作系统上，更新Etterna通常都是一个很简单的过程。无论在哪个操作系统更新，我们都建议你备份好所有手动添加到游戏里的内容——包括\n皮肤、Save文件、Script文件。歌曲文件则无需备份。\n\n在Windows系统上，安装程序可能会提示你卸载旧版本，而且有时候卸载程序会运行失败，遇到这种情况直接忽略就好。只要你不是把最新版本直接\n覆盖安装到旧版本的文件夹里，新安装的游戏就能正常运行。\n\n在Mac系统上，更新游戏其实就是重新安装一遍，而且需要的配置步骤会更少。\n\n在Linux系统上，更新游戏的方式可以是替换成最新的二进制文件，也可以通过git pull拉取最新源码后重新编译。\n\n有一个文件夹你绝对不能弄丢，那就是整个Save文件夹。这个文件夹里的几乎每一个文件，都和你的玩家分数或者游戏设置相关。
HowToSetSync=设置同步/偏移
HowToSetSyncShortDescription=让音符和音乐契合
HowToSetSyncDescription=每个玩家在游玩过程中，迟早都会遇到这样的问题：按键的判定总是整体偏慢，或者整体偏快。这反映在数据上，就是判定偏移的平均值偏慢或偏快。\n无论哪种情况，偏移值或平均偏移值为负数时，就代表音符偏早。\n\n如果你的偏移问题严重到影响正常游玩，或者判定偏移的平均值一直都很差（超过±5-10毫秒），可以试试下面这些方法。\n
Etterna提供了三种偏移设置：视觉偏移（也叫判定偏移）、全局偏移（设备偏移）和歌曲偏移。歌曲偏移是由每个谱面的作者设置的，如果这个偏移\n值出错了，那通常是作者的问题，和你无关。\n调整视觉偏移，其实就是调整完美判定对应的音符在屏幕上的视觉位置。你可以在F3调试菜单里，或者选歌界面的设置里找到这个选项。\n全局偏移会叠加在歌曲偏移之上，对所有歌曲生效。它的作用是调整音频和音符之间的同步位置。理想情况下，全局偏移的值应该是0毫秒，但如果\n你的音频设备、显示器或者输入设备存在一些兼容性问题，就可以把它设为非零值。\n你可以自动设置全局偏移和歌曲偏移，方法是进入某首歌的游玩界面，按下F6，然后尽自己最大的努力去演奏。需要注意的是，自动同步偏移功能最\n好不要运行超过2次迭代。\n你也可以用F11/F12来手动调整偏移值。
HowToChangeTheme=更改主题
HowToChangeThemeShortDescription=和皮肤（noteskin）区分
HowToChangeThemeDescription=游戏的整体视觉风格被称为主题，主题的大部分代码都是用Lua语言编写的。\n\n安装主题的方法很简单，只需解压到游戏的Themes文件夹里就行。这个文件夹一般不需要备份。\n\n更改主题的话，可以在选歌界面的设置的图像设置里找到对应的选项。更换主题后，游戏界面的样子就会和当前这个主题不一样了。
HowToChangeLanguage=更改语言
HowToChangeLanguageShortDescription=我们需要更多翻译者（是的那是我）
HowToChangeLanguageDescription=Etterna自带了几种主流语言的部分翻译，但整体来看，这些翻译都远没有达到我们期望的完善程度。\n\n我们一直都在考虑完善翻译支持，但它目前并不是一个优先级很高的开发任务。\n\n如果你想更改游戏语言，看看翻译成其他语言后是什么样子，可以在图像设置里找到语言切换选项。
HowToToggleMenuSound=菜单音效
HowToToggleMenuSoundShortDescription=如果你感觉烦人的话
HowToToggleMenuSoundDescription=有时候菜单的提示音会让人觉得很烦。\n\n想要关闭它的话，可以按下键盘上的Pause键，或者在F3调试菜单的F5页面里，也可以在选歌界面的设置里找到对应的开关选项。
HowToTogglePitchRates=倍速后变调
HowToTogglePitchRatesShortDescription=Nightcore Remix
HowToTogglePitchRatesDescription=有些玩家比起原调，更喜欢高速播放时的高音调；还有些玩家则觉得音调不变手感更好。\n\n想要开关音调跟随速率的功能，可以在F3调试菜单的F8页面（高级选项）里，或者选歌界面的设置里找到对应的选项。
HowToSwapWheelSide=选歌栏位置
HowToSwapWheelSideShortDescription=Rebirth主题改了会导致歌曲难度名遮挡返回按键等bug，慎用
HowToSwapWheelSideDescription=可以理解，在Rebirth主题中，选歌栏默认在左侧，肯定会有一部分玩家不喜欢。\n\n想要切换位置的话，可以在选歌界面的设置>图像>主题设置1里找到该设置项。
HowToLogin=登录
HowToLoginShortDescription=使用线上功能的前提
HowToLoginDescription=如果你想要上传分数或者查看在线排行榜，就必须先登录账号。\n\n想要开始登录流程的话，可以点击界面左上角的未连接图标，或者在选歌界面按下Ctrl + L。如果重复一次这个操作，就可以登出账号。\n\n需要注意的是，在此登录账号并不是游玩多人联机模式的必要条件。如果联机模式需要登录，会在进入联机界面时单独要求你登录。
HowToUpload=上传成绩
HowToUploadShortDescription=狠狠刷榜
HowToUploadDescription=想要上传任何成绩，都必须先登录账号。\n\n每次登录账号的时候（包括游戏启动时自动登录的情况），Etterna都会尝试上传所有你已经打出、但还未上传的成绩。在你刚打完一首歌曲，还没保\n存个人配置之前，也会尝试自动上传这次的分数。\n\n只有上架（ranked）谱面的分数才能被上传。你可以在成绩界面里查看某首歌的排行榜，以此判断某谱面是否为上架谱面。\n\n想要手动强制上传分数的话，可以在资料界面或者成绩界面里找到上传按钮。\n\nEtterna是在后台进行上传操作的，所以不会有明确的进度提示，你只需要耐心等待就好。\n\n分数为 0.00分，或者存在其他无效情况的成绩，是无法被上传的。
HowToFavoriteSongs=标记喜欢的歌曲
HowToFavoriteSongsShortDescription=这才是真正的音乐
HowToFavoriteSongsDescription=你的歌曲库可能会变得非常庞大，而标记功能可以帮你快速标记出那些你特别喜欢的谱面。只需要在某首歌的界面按下Ctrl + F；再次按下这个组合键，就可以取消标记。\n\n你可以在收藏列表里查看标记的歌曲，也可以按下“上”“下”“上”“下”方向键切换到收藏排序模式来查看。
HowToPermamirror=谱面永久镜像
HowToPermamirrorShortDescription=避免手型偏好
HowToPermamirrorDescription=部分谱面存在明显的单手偏好设计，而有些玩家恰好某只手的操作能力较弱。由于Etterna是基于物理操作难度进行判定的，镜像谱面只是简单交换双\n手的操作分工，并不会改变难度，因此镜像功能是游戏的核心特性，且支持排名结算。\n\n有些谱面对部分玩家来说需要始终开启镜像，但他们又不想对所有谱面都启用镜像功能。永久镜像就是为解决这个问题而生的。\n\n要为某谱面开启永久镜像，只需选中该谱面上，按下Ctrl + M。此后每次打开该谱面，镜像模式都会自动生效。
HowToPlayOsuCharts=在Etterna中游玩osu谱面
HowToPlayOsuChartsShortDescription=在Etterna吃面是一种享受
HowToPlayOsuChartsDescription=Etterna内置了.osu文件的游玩支持。从osu官网下载的文件通常是.osz格式，需要解压后才能被Etterna识别。\n\n你可以将文件后缀名改为.zip，然后用任意解压工具解压。解压后会得到一个文件夹，里面包含音频文件、封面图片以及一个或多个.osu 谱面文件。\n\n这个文件夹就包含了一个可游玩谱面的全部内容，只需将它直接放入你的Songs目录，或是放入某个曲包文件夹内即可。\n\n如果你不熟悉手动安装歌曲的方法，可以查看“手动安装歌曲”小节的帮助说明。
AboutKeymodes=关于游戏模式
AboutKeymodesShortDescription=在Etterna无法更换游戏模式
AboutKeymodesDescription=这款游戏的本质是多款实体音游的模拟器，因此按键模式会先按游戏类型划分，再进一步细分不同的玩法风格。\n\nDance - 核心游戏模式，基础为4键。Dance-double为 8 键，该分类下还包含3键变体。\nSolo - 独立于核心模式的玩法，为6键。\nBeat - 即BMS，包含5+1键、7+1键两种模式，且均同样支持double。\nKb7 - 一款小众的游戏模式，为7键。\nPump - 支持5、6 、10键，涵盖single、halfdouble、double三种玩法。\nPopn - 对应Popn音乐游戏，支持5键和9键。\n\n同一游戏模式下的不同玩法风格，会显示在难度面板中。你可以在选歌界面的设置里，或是选项菜单的“选择游戏模式”页面切换不同的游戏模式。
AboutCleartypes=关于结算类型
AboutCleartypesShortDescription=各类结算类型解释
AboutCleartypesDescription=每一份成绩都会被赋予一个名为结算类型的标识，它能让你快速直观地判断成绩的质量。每份成绩只会对应一个结算类型。\n\nMFC - Marvelous Full Combo - 所有判定都是Marvelous\nWF - White Flag - 仅一个Perfect判定，其余均为Marvelous\nSDP - Single Digit Perfects - 判定仅含Marvelous和Perfect，且Perfect数量不超过9个\nPFC - Perfect Full Combo - 判定仅含Marvelous和Perfect\nBF - Black Flag - 仅有1个Great判定，其余均为Marvelous和Perfect\nSDG - Single Digit Greats - A 达成全连（Full Combo），且Great判定数量不超过9个\nFC - Full Combo - 无断连，即没有Good，Bad，Miss或NG\nMF - Miss Flag - 差一点全连（Full Combo），仅出现1次断连\nSDCB - Single Digit Combo Breakers - 差一点全连（Full Combo），断连数量不超过9个\nClear - 成功完成谱面\nFailed - 未完成谱面
LegacyKeyConfig=旧版按键设置
LegacyKeyConfigShortDescription=无需使用
LegacyKeyConfigDescription=你仍可以通过主菜单的设置进入旧版按键设置界面。界面左侧是相关的控制按键设置区域，对应玩家1；右侧原本是玩家2的设置区域，但现在已经失\n效，默认的轨道按键无法直接修改。\n\n若要解绑某个默认按键，需要将该按键重新绑定到右侧不常用的按键上。\n\n如果你只使用Rebirth主题的新版按键设置界面，那么完全不需要用到这个旧版界面。\n\n请注意，虽然这个界面允许你将多按键绑定到一个功能上，但使用这种设置打出的成绩不被允许参与排名。该功能仅适用于有特殊操作习惯的玩家。
ReplayInfo=回放功能
ReplayInfoShortDescription=666水段怎么掉这么多
ReplayInfoDescription=只要成绩存在有效的回放数据，你就可以查看对应的本地或在线回放。\n\n本地回放的文件保存在Replays或ReplaysV2文件夹中。你需要先在成绩界面找到对应的成绩，然后点击回放按钮即可播放。\n\n在线回放则可以直接从谱面的排行榜页面点击观看。\n\n在回放过程中，你可以暂停播放、调整播放速率，或是拖动进度条跳转位置。界面上的大型进度条即可作为拖动跳转的控制条。\n\n回放的结算界面会还原该成绩实际达成时的结算画面。
SelectMusicTips=选歌界面实用技巧
SelectMusicTipsShortDescription=高效导航选歌菜单
SelectMusicTipsDescription=选歌界面内置了大量快捷键，能大幅提升你的操作效率。熟记这些快捷键会为你带来极大便利，你可以查看选歌界面快捷键小节的说明页面了解详情。\n\n界面的部分区域有其它鼠标操作功能，点击选歌栏的标题栏，会随机选择曲包或当前曲包的一首歌曲；点击资料页面的特定文字，可以切换显示的信息\n内容；点击歌曲的封面图，即可打开谱面预览界面。\n\n你可以点击或拖动选歌栏的滚动条，快速浏览歌曲列表。右键点击资料中的成绩，可以将该成绩标记为无效。\n\nEscape键是一个非常实用的按键，若点击界面顶部按钮打开了侧边菜单，可用Escape键快速退出该界面。
ProfileTab=个人资料界面使用说明
ProfileTabShortDescription=你和你的个人资料
ProfileTabDescription=资料界面包含了与你的游戏记录、成绩相关的大部分核心信息。“综合”区域可以让你快速查看离线/在线的Rating及各类基础统计数据。在这个区域，\n你可以一键上传所有未上传的成绩，或是在本地重新验证所有成绩的有效性。你还可以点击“玩家Ratings（在线/离线）”文字，将其切换为“游玩统计”，查看更详细的数据。\n\n点击“查看近期成绩”按钮，你可以查看数百条成绩记录，这些成绩按达成日期排序。点击标签可进行排序，例如点击“乱键”标签会按乱键MSD排\n序。
GoalsTab=目标功能使用说明
GoalsTabShortDescription=目标使人进步
GoalsTabDescription=目标界面会列出你为各谱面创建的、期望达成的目标成绩。这正是“目标”的核心意义。默认情况下，所有目标默认为优先级1、1倍速、93%准确度。\n你可以点击这些属性对应的数值，对其进行调整。\n\n创建目标的方式有两种：一是点击“目标”按钮，二是按下快捷键Ctrl + G。\n\n目标界面顶部的一排按钮用于对目标列表进行排序，最右侧的按钮可根据目标的完成状态筛选。\n\n无效目标指的是，你已经打出了超越该目标的成绩，这个目标也就失去了意义。遇到这种情况，你可以删除该目标，或是设置一个更高的目标。\n\n所有目标信息都会保存至你的XML配置文件中。
PlaylistsTab=收藏功能使用说明
PlaylistsTabShortDescription=创建合集
PlaylistsTabDescription=收藏界面支持你创建多个收藏夹，既可以用于连续游玩，也可以作为谱面收藏清单。这些列表不一定非要像游玩列表那样连续游玩，也可以单纯用作谱\n面归类。\n\n创建收藏夹的方法：按下Ctrl + P，或是点击“新建收藏夹”。创建完成后，点击收藏夹名称即可进入该列表的管理界面。\n\n向选中的收藏夹添加谱面的方式：按下Ctrl + A，或是点击“添加当前谱面”按钮。如果要将收藏夹用于游玩列表，你还可以点击详情列表中的倍速数值，修改对应谱面的游玩倍速。\n\n收藏夹内的谱面顺序无法调整。\n\n所有收藏信息都会保存至你的 XML 配置文件中。
TagsTab=标签功能使用说明
TagsTabShortDescription=为谱面添加自定义标签
TagsTabDescription=标签功能允许你为谱面添加描述性标签，你既可以用自定义标签标注谱面特点，也可以根据标签筛选谱面。\n\n一首谱面可以被添加任意数量的标签。已添加的标签（最多显示一定数量）会在总览界面中展示，且在标签界面内会以特殊颜色高亮显示。\n\n点击“显示标签谱面”，可设置筛选条件，仅显示带有该标签的歌曲；点击“隐藏标签谱面”则效果相反，所有带有该标签的歌曲都会被隐藏。设置完\n成后，你需要点击“应用”使筛选条件生效。\n\n为谱面添加标签的操作很简单，点击“设置标签谱面”，再点击想要添加的标签即可。\n\n删除标签需要点击“删除标签”，然后点击想要删除标签。\n\n点击“重置”按钮会清空所有筛选条件，不会删除任何已创建的标签。\n\n标签信息会保存在tags.lua文件中，这个文件可以分享给其他玩家。标签信息会保存在 tags.lua 文件中，这个文件可以分享给其他玩家。
GettingSupport=如何获得他人帮助
GettingSupportShortDescription=别当伸手党
GettingSupportDescription=有时候，Etterna的安装或修复并不是一个简单的过程。当然，对我们很多人来说这很容易，但并非所有人都能解决。.\n\n由于很多玩家都知道常见问题的解决方法，如果你需要帮助，可以在Etterna相关社区中提问求助。需要注意的是，Github的issues页面（可在游戏标\n题界面找到入口）是用于提交bug报告的，而非寻求使用帮助的地方。\n\n能为你解答问题的Discord服务器，可以在Github仓库的首页，或是与这款游戏相关的任意官网上找到。（译者：对于无法连接到Discord地区的\n玩家，可以在Blibili、QQ或贴吧等寻求帮助）。
Softlocked=游戏软锁定
SoftlockedShortDescription=游戏卡死了
SoftlockedDescription=在极少数情况下，不仅是Rebirth主题，其他主题也可能出现游戏未完全崩溃或冻结，但陷入卡死的状态。判断是否为软锁的方法：部分按键可能仍有\n效，但你无法前进、移动或返回上一级界面。\n\n解决软锁的即时方案是按下Ctrl + “系统设置”键。默认情况下，系统设置键对应的是Scroll Lock，你可以在旧版按键设置界面中重新绑定该按键。按下这个快捷键后，你会被直接跳转至选项菜单。\n\n此外，按下F3 + F8 + 9也可以进入旧版按键设置界面。\n\n如果你遇到了软锁情况，若能稳定复现该问题，并在Github的issues页面详细描述复现步骤，将有助于开发团队修复这个bug。
InputBroke=输入功能失效
InputBrokeShortDescription=菜单无法响应操作
InputBrokeDescription=Rebirth主题存在一些输入相关的小问题，可能会导致菜单导航失效，或是响应异常。\n\n解决方法如下：你可以先尝试按Escape键返回主菜单。如果无法操作，或是你已经在主菜单界面，可以尝试用以下方法重载脚本和悬浮界面，依次按下\nCtrl + F2和Ctrl + Shift + F2，然后按下F3 + F6 + 2重新加载当前界面。\n\n如果你遇到了这种情况，向开发团队反馈该问题会非常有帮助。
GeneralTips=常见故障解决
GeneralTipsShortDescription=非常容易解决
GeneralTipsDescription=这款游戏运行过程中可能会出现各种突发问题，可以试试以下这些方法。\n\n针对Rebirth主题的卡死、输入故障和错误弹窗问题，通常可以通过重载脚本、悬浮界面和当前界面来临时解决，对应的快捷键组合是：Ctrl + F2 > Ctrl + Shift F2 > F3 + F6 + 2。这个组合键对主题制作者来说很有用。\n\n按下Ctrl + “系统设置”键或F3 + F8 + 9，可以帮你解决软锁。\n\n如果输入功能或图像显示出现异常，重启游戏通常能解决问题。\n\n游戏启动时频繁崩溃，通常是因为曲包文件夹中混入了无效文件，或是存在BPM为0的谱面。
SongDoesntLoad=歌曲无法加载
SongDoesntLoadShortDescription=很神秘
SongDoesntLoadDescription=谱师在制作谱面时，有时会遇到谱面始终无法在游戏中显示的问题。这其实是有原因的（大概率是游戏 bug）。\n\n如果你的歌曲文件夹中只有音频文件，没有.sm谱面文件，并且你重启了游戏，或是按了Ctrl + Q重新加载歌曲库，那么这个文件夹会被游戏永久判定为非歌曲目录，从而被忽略。同理，如果文件夹内有.sm文件，但文件中没有有效的谱面数据，\n也会被游戏忽略。\n\n为了避免这种情况，你应该在重启游戏或按下Ctrl + Q之前，就将音频文件、.sm文件和有效的谱面数据一同放入歌曲文件夹，这样新歌曲就能正常加载了。\n\n如果已经出现了上述问题，你可以通过两种方法解决：一是删除游戏的Cache文件夹，二是重命名该歌曲文件夹。
SongDoesntUpdate= 歌曲信息不更新
SongDoesntUpdateShortDescription=游戏特色
SongDoesntUpdateDescription=谱师在编辑谱面时，可能会遇到这样的问题：进入游戏测试时，音符数据确实更新了，但歌曲的结束时间却偏早或偏晚，甚至所有元数据都没有同步为\n保存后的状态。\n\n出现这个问题的原因是，游戏会优先信任缓存数据。进入游玩界面时，游戏会从本地磁盘加载新的音符数据，但不会根据新数据修改谱面的属性信息。\n\n解决方法：将光标悬浮在该歌曲上，按下Ctrl + Shift + R，即可强制游戏从磁盘更新该歌曲的所有信息。
ScoresDontSave=成绩无法保存
ScoresDontSaveShortDescription=罕见bug或操作不当
ScoresDontSaveDescription=如果你的成绩无法保存，可能是由以下几种情况导致的。\n\n最常见的原因是，你不小心开启了使成绩无效功能。这个选项可以在成绩界面找到，正常情况下不应该开启它。\n\n另一种原因是一个罕见的bug，叫做“0 倍速问题”，在结算界面时，你的音乐速率被莫名设置为0倍速，这会导致后续整个游戏会话的成绩大概率都无法保存。解决方法很简单，只需重启游\n戏即可。\n\n最后一种可能是游戏安装路径有误，你将游戏安装在了没有写入权限的位置（例如系统盘的Program Files文件夹），或是你的设备磁盘空间不足。（译者：建议读者在创建文件夹时不使用中文字符，容易产生很多莫名其妙的bug）
ScoresWorth0=成绩为0.00
ScoresWorth0ShortDescription=无效成绩
ScoresWorth0Description= 成绩在生成时一旦判定为无效，会被记为0分。\n\n成绩无效的判定条件：\n使用了违规的游戏修改器（具体哪些属于违规修改器一目了然）\n谱面的音符数量少于 200 个\n游玩时未通关\n开启了多押合并功能（Chord Cohesion On）\n启用自动游玩模式或练习模式
RandomCrashes=游戏随机崩溃
RandomCrashesShortDescription=唉习惯了
RandomCrashesDescription=游戏有时会出现崩溃情况，在你的游戏安装目录下的对应文件夹中会生成崩溃转储文件。\n\n如果你开启了崩溃文件上传功能，只需在Github的issues页面，或是在Discord的反馈渠道中告知开发团队你遇到了崩溃问题即可。若未开启该功能，\n同样需要反馈问题，但要准备好提供对应的.dmp崩溃文件和游戏日志。\n\n如果游戏总是毫无征兆地崩溃，建议提交issue反馈，或是向社区求助排查问题原因。

