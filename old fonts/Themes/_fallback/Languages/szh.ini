Accel=选择加速、减速或其他方式以调整流速。Accelerate, Decelerate or otherwise adjust the arrow speed.
AllowExtraStage=When enabled (and Event Mode isn't on), allows the player to earn extra stages after completing certain requirements.
AllowHoldForOptions=设为双击模式时，选歌时长按“开始”键将无法进入设置界面。\n开启则长按可快速进入设置页。
AllowStartToGiveUp=开启后，游戏过程中长按“开始”数秒即可直接放弃本次游玩。禁用则取消该快捷退出功能。
AllowSongDeletion=开启后，玩家在选歌界面按下“Ctrl+Backspace”可从系统中永久删除曲目。
AllowMultipleHighScoreWithSameName=If turned off, only the highest score with a given name will be saved. If turned on, it will allow mutliple high scores with a given name to be saved.
AllowMultipleToasties=Allow multiple toasties to be shown in one song.
Announcer=从已安装的播报员语音包中选择。
Appearance=Hide the incoming Arrows in different ways. Sudden makes them appear near the receptors. Hidden makes them disappear instead.
Appearance Options=切换主题、播报员及其他风格选项。
Theme Options=Change theme specific features and functions.
