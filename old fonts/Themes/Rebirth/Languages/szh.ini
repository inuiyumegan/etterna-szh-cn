ReceptorSize=轨道面板宽度
ReceptorSizeExplanation=调整轨道面板和音符大小。\n50%尺寸也叫100%迷你模式。
JudgeDifficulty=判定难度
JudgeDifficultyExplanation=判定窗口的难度，数值越高则难度越高。\n所有成绩在结算时都会转换为判定4标准。
Mirror=镜像
MirrorExplanation=水平翻转轨道面版布局。
GlobalOffset=全局偏移
GlobalOffsetExplanation=全局音频偏移（单位：秒）。\n负数代表提前。
VisualDelay=图形偏移
VisualDelayExplanation=音符视觉偏移（单位：秒）。又称判定偏移。\n负数代表提前。
GameMode=游戏模式
GameModeExplanation=Dance - 3k/4k/8k | Solo - 6k | Pump - 5k/6k/10k | Beat - 5k+1/7k+1/10k+2/14k+2 | Kb7 - 7k | Popn - 5k/9k
FailType=失败后
FailTypeExplanation=切换游玩失败机制。若血条清空，\n即使开启继续游玩模式，本次得分仍视为无效。
CustomizeKeybinds=自定义键位
CustomizeKeybindsExplanation=自定义按键绑定。
CustomizeKeybindsButton=自定义键位
PracticeMode=进入练习模式
PracticeModeExplanation=进入练习模式。
PracticeModeButton=进入练习模式
Appearance=视线遮挡模组
AppearanceExplanation=下隐 - 音符到达判定区前消失。\n上隐 - 音符在屏幕移动一段距离才会显示。\n隐形 - 音符完全透明。闪烁 - 音符闪烁显示。
HiddenOffset=下隐模组百分比
HiddenOffsetExplanation=调整下隐位置偏移。下隐会让音符在\n到达判定区前消失。
SuddenOffset=上隐模组百分比
SuddenOffsetExplanation=调整上隐位置偏移。上隐会让音符在\n屏幕上移动一段距离才显示。
Perspective=视角
PerspectiveExplanation=轨道面板的倾斜与扭曲效果。
PerspectiveIntensity=视角角度
PerspectiveIntensityExplanation=控制轨道面板的倾斜与扭曲效果程度。
HidingModifiers=隐藏玩家面板
HidingModifierExplanation=隐藏游玩界面中特定元素。
Hidenote=隐藏判定
HidenoteExplanation=音符需达成指定判定等级及以上，击打后才会消失。
CenterPlayer1=默认居中轨道面板
CenterPlayer1Explanation=在游玩界面中水平居中音符区域（旧版快捷设置）。
NoteFieldFilter=轨道面板背景透明度
NoteFieldFilterExplanation=调整游玩界面中音符区域后方面板的透明度。
BGBrightness=背景透明度
BGBrightnessExplanation=调整游玩界面背景亮度。亮度0%时停止加载背景。
ReplayModEmulation=回放模组模拟
ReplayModEmulationExplanation=观看回放时，使用该回放自带的参数，如流速。
ExtraScrollMods=其它模组
ExtraScrollModsExplanation=以更多方式改变音符滚动方向。
FunEffects=娱乐模组
FunEffectsExplanation=仅用于娱乐、无实用价值的视觉滚动模组。
Acceleration=加速度模组
AccelerationExplanation=通常无实用价值的音符滚动速度模组。
Mines=地雷
MinesExplanation=开启/禁用地雷。额外地雷会将整行音符替换为地雷。
Turn=音符变换
TurnExplanation=通过整体位移或随机排列改变谱面。
PatternTransform=键型变换
PatternTransformExplanation=通过插入额外音符生成特定键型，修改谱面音符数据。
HoldTransform=长键变换
HoldTransformExplanation=修改谱面中的长键。
RemoveMods=移除元素
RemoveModsExplanation=移除指定音符、键型或特定类型的音符。
InsertMods=插入
InsertModsExplanation=通过插入额外音符修改谱面，营造特定游玩手感。
BPMDisplay=BPM显示
BPMDisplayExplanation=切换每分钟节拍数显示。
RateDisplay=倍速显示
RateDisplayExplanation=切换谱面倍速显示。
PercentDisplay=准确度显示
PercentDisplayExplanation=切换wife百分比显示。
MeanDisplay=偏移显示
MeanDisplayExplanation=切换击打平均偏移值显示。
EWMADisplay=指数加权移动平均值显示
EWMADisplayExplanation=切换指数加权移动平均值显示。该数值为所有击打\n结果的加权数值，近期偏移数据权重更高。
StdDevDisplay=标准差显示
StdDevDisplayExplanation=切换标准差显示。\n显示当前游玩谱面全程偏移的标准差数值。
ErrorBar=偏移条显示
ErrorBarExplanation=切换偏移条。普通模式显示近期打击偏移。\n指数加权移动平均模式显示近期击打偏移加权数值。
ErrorBarCount=偏移条打击计数
ErrorBarCountExplanation=设置普通偏移条显示的击打次数上限，\n或指数加权移动平均偏移条计算的击打次数。
FullProgressBar=大型进度条显示
FullProgressBarExplanation=切换显示大型进度条。
MiniProgressBar=小型进度条显示
MiniProgressBarExplanation=切换显示小型进度条。
Leaderboard=排行榜显示
LeaderboardExplanation=切换游玩排行榜。\n在线成绩模式仅显示个人成绩与在线成绩。\n本地记录模式仅显示当前倍速下的个人成绩。
PlayerInfo=玩家面板显示
PlayerInfoExplanation=玩家辅助信息显示。
TargetTracker=目标追踪器显示
TargetTrackerExplanation=切换目标追踪器，显示当前分数及与目标分数的差值。
TargetTrackerMode=目标追踪器模式
TargetTrackerModeExplanation=调整目标数值。个人最佳模式使用个人最佳成绩，\n无成绩时切换为目标准度模式。个人最佳（回放）\n模式在游玩中逐行跟踪个人最佳成绩。
TargetTrackerGoal=目标准度
TargetTrackerGoalExplanation=为目标追踪器设置目标达成准度。
LaneCover=挡板
LaneCoverExplanation=切换挡板。下隐模式遮挡判定线区域。\n上隐模式遮挡音符出现位置。
JudgeCounter=判定计数器显示
JudgeCounterExplanation=切换判定计数器显示。
JudgmentText=判定文本显示
JudgmentTextExplanation=切换判定文本显示。
JudgmentAnimations=判定文本动画显示
JudgmentAnimationsExplanation=切换判定文本过渡动画。
ComboTweens=连击文本动画显示
ComboTweensExplanation=切换连击文本过渡动画。
ComboText=连击文本显示
ComboTextExplanation=切换连击文本。
ComboGlow=连击数字显示
ComboGlowExplanation=切换MFC和PFC时连击数字的额外白色高光。
ComboLabel=连击文本标签显示
ComboLabelExplanation=切换连击文本中的“Combo”文字标签。
CBHighlights=断连高光显示
CBHighlightsExplanation=切换断连时的轨道高亮提示。
MeasureCounter=小节计数器显示
MeasureCounterExplanation=切换小节计数器，在相对高NPS长段落显示。
MeasureLines=小节线显示
MeasureLinesExplaantion=切换轨道面板小节分界线。
NPSDisplay=NPS显示
NPSDisplayExplanation=切换每秒音符数显示。仅展示NPS和最大NPS。
NPSGraph=NPS图显示
NPSGraphExplanation=切换每秒音符数图显示。显示NPS随时间变化图。
Language=语言
LanguageExplanation=更改游戏语言。
Theme=主题
ThemeExplanation=更换游戏整体的界面皮肤。
DisplayMode=显示模式
DisplayModeExplanation=修改游戏显示模式。\n无边框模式需选择原生全屏分辨率。
AspectRatio=画面比例
AspectRatioExplanation=修改游戏画面的宽高比例。
DisplayResolution=分辨率
DisplayResolutionExplanation=修改游戏的显示分辨率。
RefreshRate=刷新率
RefreshRateExplanation=修改屏幕刷新率，多数情况设为默认值即可。\n仅修改刷新率，不限制帧率。\n仅在独占全屏模式下生效。
ColorDepth=显示色深
ColorDepthExplanation=根据显示器参数修改游戏的色深。通常无需修改。
HighResTextures=强制使用高分辨率纹理
HighResTexturesExplanation=强制使用高分辨率纹理。\n禁用后不显示“双分辨率”图像标签。
TextureResolution=纹理分辨率
TextureResolutionExplanation=修改全局纹理分辨率。\n数值越低画质越差，但可能提升帧率。
VSync=垂直同步
VSyncExplanation=将游戏刷新率与帧率限制为设定的屏幕刷新率。
FrameLimit=非游玩界面帧数限制
FrameLimitExplanation=设置非游玩界面的帧率上限。0为无限制。\n仅在垂直同步禁用时生效。
FrameLimitGameplay=游玩界面帧数限制
FrameLimitGameplayExplanation=设置游玩界面的帧率上限。0为无限制。\n仅在垂直同步禁用时生效。
FastNoteRendering=音符快速着色
FastNoteRenderingExplanation=优化游玩界面音符着色。\n禁用音符皮肤的对齐类特效（不禁用对齐本身）。\n大幅提升帧率。
ShowStats=性能显示器
ShowStatsExplanation=在屏幕上显示帧率等统计数据。
TapGlow=音符击打闪白
TapGlowExplanation=启用上隐和下隐模组时，\n音符被击打消失前显示白色闪光。
MusicWheelPosition=选歌栏位置
MusicWheelPositionExplanation=设置选歌栏在屏幕的显示侧。
MusicWheelBanners=选歌栏缩略图
MusicWheelBannersExplanation=切换选歌栏的缩略图。
MusicWheelSpeed=选歌栏速度
MusicWheelSpeedExplanation=设置在选歌界面长按“左”“右“方向键\n的切换歌曲速度。
VideoBanners=视频横幅
VideoBannersExplanation=视频横幅在选歌界面播放，如选歌栏等。
ShowBGs=背景图显示
ShowBGsExplanation=切换全局所有界面的背景图显示。
ShowBanners=横幅显示
ShowBannersExplanation=切换全局所有界面的横幅显示。
BGBannerColor=背景图默认横幅颜色
BGBannerColorExplanation=选歌界面无背景图时，使用曲包或歌曲横幅的\n平均色作为背景色。仅用于选歌界面。
AllowBGChanges=游玩界面背景变化
AllowBGChangesExplanation=切换游玩界面的背景图变化。
EasterEggs=彩蛋与Toasty
EasterEggsExplanation=切换游戏中的隐藏彩蛋和趣味提示信息。
Visualizer=音乐可视化
VisualizerExplanation=切换选歌界面的音乐可视化效果。
MidGrades=中间结算等级显示。
MidGradesExplanation=显示主要等级之间的中间等级，需重启游戏生效。\n在原来的评级后添加“·”和“:”以细化结算评级。
SSRNorm=SSR标准排序
SSRNormExplanation=全局自动按SSR标准排序并默认使用该标准，\nSSR标准为高分记录的判定4标准。需重启游戏生效。
ShowLyrics=歌词显示
ShowLyricsExplanation=显示含兼容歌词文件（.lrc）歌曲的歌词。
Transliteration=文本音译显示
TransliterationExplanation=显示歌曲元数据中作者自定义的音译内容。
TipType=提示文案类型
TipTypeExplanation=修改结算界面底部显示的提示文案类型。
BGFit=背景匹配设置
BGFitExplanation=修改背景图的裁剪匹配策略。
ColorConfig=颜色配置
ColorConfigExplanation=修改当前主题的颜色参数。
ColorConfigButton=颜色配置
AssetSettings=资料设置
AssetSettingsExplanation=设置头像、判定效果和Toasty。
AssetSettingsButton=资料设置
Volume=全局音量
VolumeExplanation=控制游戏所有声音的音量大小。
MenuSounds=效果音
MenuSoundsExplanation=切换菜单操作音效。
MineSounds=地雷音效
MineSoundsExplanation=切换地雷爆炸时的音效。
PitchRates=更改倍速后变调
PitchRatesExplanation=调整谱面播放速率将同步改变音调。
CalibrateAudioSync=音频同步校准
CalibrateAudioSyncExplanation=校准整个游戏的音频同步参数。
CalibrateAudioSyncButton=音频同步校准
BackDelayed=返回键延迟
BackDelayedExplanation=修改游玩界面中返回键的反应行为。
StartGiveUp=长按开始键放弃游戏
StartGiveUpExplanation=游玩中长按开始键几秒后，允许强制失败退出。
ForceNoDoubleSetup=禁用双键位映射
ForceNoDoubleSetupExplanation=游玩中，按键可能存在多个映射，\n该设置锁定为首次按下的键位映射。
Debounce=输入防双击时间
DebounceExplanation=设置两次连续输入的最小间隔时间。
ScrollDebounce=滚轮防抖动时间
ScrollDebounceExplanation=设置鼠标滚轮两次连续滚动的最小间隔时间。
TestInput=输入设备测试
TestInputExplanation=进入输入设备测试界面。
TestInputButton=输入设备测试
CreateProfile=新建用户
CreateProfileExplanation=创建一个新用户。
CreateProfileButton=新建用户
RenameProfile=重命名用户
RenameProfileExplanation=重命名已有用户。
RenameProfileButton=重命名用户

